<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" fill="#2c4a35"/>
  <!-- Tennis court lines -->
  <g stroke="rgba(212,179,106,.25)" stroke-width="1.5" fill="none">
    <rect x="22" y="22" width="136" height="136"/>
    <line x1="22" y1="90" x2="158" y2="90"/>
    <line x1="90" y1="22" x2="90" y2="158"/>
  </g>
  <!-- Tennis ball -->
  <circle cx="90" cy="90" r="34" fill="#d4b36a"/>
  <path d="M 64 78 Q 90 90 116 78" fill="none" stroke="#2c4a35" stroke-width="2" stroke-linecap="round"/>
  <path d="M 64 102 Q 90 90 116 102" fill="none" stroke="#2c4a35" stroke-width="2" stroke-linecap="round"/>
  <!-- DTL monogram below -->
  <text x="90" y="160" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="16" font-weight="900" fill="#d4b36a" letter-spacing="4">DTL</text>
