<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기 결과 — Down the Line</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Barlow:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#2c4a35;--g2:#3a5c44;--g3:#4e7a5a;--glt:#7aab87;
  --iv:#f7f3ed;--iv2:#ede8e0;--iv3:#e2dbd0;
  --ink:#1a1f1c;--ink2:#2e3530;--sm:#6b7570;--sm2:#9aa49e;
  --gd:#b8933a;--gdl:#d4b36a;--w:#ffffff;
  --ll:rgba(26,31,28,.1);
  --female:#9b3d5a;--fbg:#fde8ed;
  --male:#2a4a80;--mbg:#e6f0ff;
}
html{scroll-behavior:smooth;}
body{font-family:'Barlow','Noto Sans KR',sans-serif;background:var(--iv);color:var(--ink);}
#nav{background:var(--g);height:56px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;position:sticky;top:0;z-index:100;}
.nav-back{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.nav-back:hover{color:var(--gdl);}
.nav-back::before{content:'←';}
.nav-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--w);}
.nav-links{margin-left:auto;display:flex;gap:.5rem;}
.nav-link{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:all .2s;padding:.4rem .9rem;border:1px solid rgba(255,255,255,.15);}
.nav-link:hover,.nav-link.active{color:var(--w);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);}
.nav-link.back{background:var(--gd);color:var(--ink);border-color:var(--gd);}
.nav-link.back:hover{background:var(--gdl);}
.wrap{max-width:960px;margin:0 auto;padding:3rem 2rem;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;text-transform:uppercase;line-height:.9;color:var(--ink);margin-bottom:.5rem;}
.page-title em{font-style:italic;color:var(--g3);font-weight:300;}
.page-sub{font-size:.88rem;color:var(--sm);font-weight:300;margin-bottom:3rem;line-height:1.7;}
.card{background:var(--w);border:1px solid var(--ll);padding:2.5rem;margin-bottom:1.5rem;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g3);margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem;}
.card-title::before{content:'';width:18px;height:2px;background:var(--g3);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:.4rem;}
.form-group.full{grid-column:span 2;}
.form-label{font-size:.72rem;color:var(--sm);font-weight:400;}
.form-select,.form-input{border:1px solid var(--ll);padding:.65rem .9rem;font-family:'Barlow','Noto Sans KR',sans-serif;font-size:.88rem;color:var(--ink);background:var(--iv);outline:none;appearance:none;width:100%;transition:border-color .2s;}
.form-select:focus,.form-input:focus{border-color:var(--g3);}
.score-row{display:flex;align-items:center;gap:1rem;}
.score-input{width:72px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:700;border:1px solid var(--ll);padding:.5rem;background:var(--iv);outline:none;color:var(--ink);}
.score-input:focus{border-color:var(--g3);}
.score-vs{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:2px;color:var(--sm2);}
.score-hint{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g3);}
.preview-box{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;padding:1rem 1.2rem;background:var(--iv2);}
.preview-team{display:flex;gap:.4rem;flex-wrap:wrap;}
.preview-team.right{justify-content:flex-end;}
.preview-vs{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;color:var(--sm2);}
.chip{font-size:.75rem;font-weight:500;padding:.2rem .6rem;border-radius:2px;}
.chip-f{background:var(--fbg);color:var(--female);}
.chip-m{background:var(--mbg);color:var(--male);}
.btn-submit{width:100%;margin-top:1.5rem;padding:1rem;background:var(--g);color:var(--w);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;}
.btn-submit:hover{background:var(--g2);}
.btn-submit:disabled{background:var(--sm2);cursor:not-allowed;}
.archive-filters{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:.4rem 1rem;border:1px solid var(--ll);background:none;color:var(--sm);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{background:var(--g);color:var(--w);border-color:var(--g);}
.match-card{border:1px solid var(--ll);background:var(--w);margin-bottom:.5rem;}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.2rem;background:var(--iv2);border-bottom:1px solid var(--ll);}
.mc-event{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g3);}
.mc-date{font-size:.7rem;color:var(--sm2);}
.mc-body{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;padding:.9rem 1.2rem;gap:.8rem;}
.mc-team{display:flex;gap:.3rem;flex-wrap:wrap;}
.mc-team.right{justify-content:flex-end;}
.mc-scores{text-align:center;}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;line-height:1;color:var(--ink);}
.mc-score.win{color:var(--g);}
.mc-score.lose{color:var(--sm2);}
.mc-colon{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;color:var(--sm2);letter-spacing:1px;}
.mc-foot{padding:.5rem 1.2rem;border-top:1px solid var(--ll);display:flex;align-items:center;justify-content:space-between;}
.mc-mvp{font-size:.72rem;color:var(--gd);}
.del-btn{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sm2);background:none;border:none;cursor:pointer;transition:color .2s;}
.del-btn:hover{color:#c0392b;}
.edit-btn{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--g3);background:none;border:none;cursor:pointer;transition:color .2s;}
.edit-btn:hover{color:var(--g);}
.state-msg{text-align:center;padding:3rem;color:var(--sm2);}
.state-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.3;}
.state-text{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--ll);border-top-color:var(--g3);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:.5rem;}
@keyframes sp{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:2rem;right:2rem;padding:.8rem 1.5rem;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;z-index:999;transition:opacity .3s,transform .3s;opacity:0;transform:translateY(10px);pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.ok{background:var(--g);color:var(--w);}
.toast.err{background:#c0392b;color:var(--w);}
.result-table{width:100%;border-collapse:collapse;}
.result-table th{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:.8rem .6rem;text-align:left;background:var(--g);color:var(--w);}
.result-table td{padding:.7rem .6rem;border-bottom:1px solid rgba(26,31,28,.06);font-size:.82rem;color:var(--ink2);}
.result-table tr{cursor:pointer;transition:background .15s;}
.result-table tr:hover td{background:rgba(78,122,90,.04);}
.result-table .score-cell{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;text-align:center;min-width:60px;}
.result-table .win{color:var(--g);}
.result-table .lose{color:var(--sm2);}
.result-group{border:1px solid var(--ll);margin-bottom:.5rem;background:var(--w);}
.result-group-head{display:flex;align-items:center;padding:.8rem 1rem;cursor:pointer;transition:background .15s;gap:.8rem;}
.result-group-head:hover{background:var(--iv2);}
.rg-info{flex:1;}
.rg-title{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--ink);}
.rg-meta{font-size:.68rem;color:var(--sm2);margin-top:.1rem;}
.rg-summary{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;color:var(--g3);letter-spacing:1px;}
.rg-arrow{font-size:.7rem;color:var(--sm2);transition:transform .2s;}
.result-group-body{display:none;border-top:1px solid var(--ll);padding:.5rem 1rem;}
.result-group-body.open{display:block;}
.rg-match{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:.5rem;padding:.6rem 0;border-bottom:1px solid rgba(26,31,28,.04);}
.rg-match:last-child{border-bottom:none;}
.rg-teams{display:flex;gap:.3rem;align-items:center;min-width:120px;}
.rg-teams:nth-child(3){justify-content:flex-start;}
.rg-score{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;min-width:80px;text-align:center;display:flex;align-items:center;justify-content:center;gap:.3rem;}
.rg-score .win{color:var(--g);}
.rg-score .lose{color:var(--sm2);}
.inline-score-sm{width:32px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;border:1px solid var(--ll);padding:.2rem;background:var(--iv);outline:none;color:var(--ink);-moz-appearance:textfield;}
.inline-score-sm::-webkit-outer-spin-button,.inline-score-sm::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.inline-score-sm:focus{border-color:var(--g3);background:var(--w);}
.rg-row{cursor:pointer;}
.rg-row:hover td{background:rgba(78,122,90,.04);}
.rg-detail-row td{background:var(--iv2);}
.rg-detail-body{padding:.6rem 1rem;}
@media(max-width:600px){
  .wrap{padding:1.5rem 1rem;}
  .page-title{font-size:2rem;}
  .page-sub{font-size:.8rem;margin-bottom:2rem;}
  .card{padding:1.2rem;}

  /* 네비게이션 */
  #nav{padding:0 .8rem;gap:.6rem;height:50px;}
  .nav-title{font-size:.82rem;letter-spacing:2px;}
  .nav-links{gap:.3rem;}
  .nav-link{font-size:.6rem;padding:.3rem .5rem;letter-spacing:1px;}

  /* 폼 */
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:span 1;}
  .form-label{font-size:.68rem;}
  .form-select,.form-input{font-size:.82rem;padding:.55rem .7rem;}

  /* 스코어 */
  .score-row{gap:.6rem;}
  .score-input{width:60px;font-size:1.3rem;padding:.4rem;}

  /* 프리뷰 */
  .preview-box{grid-template-columns:1fr auto 1fr;gap:.5rem;padding:.7rem;}

  /* 매치 카드 */
  .mc-body{grid-template-columns:1fr 50px 1fr;gap:.4rem;padding:.7rem .8rem;}
  .mc-head{padding:.5rem .8rem;}
  .mc-event{font-size:.55rem;}
  .mc-score{font-size:1.4rem;}
  .mc-foot{padding:.4rem .8rem;flex-wrap:wrap;gap:.4rem;}
  .chip{font-size:.68rem;padding:.15rem .45rem;}

  /* 필터 */
  .archive-filters{gap:.3rem;}
  .filter-btn{font-size:.6rem;padding:.3rem .6rem;}

  /* 버튼 */
  .btn-submit{font-size:.75rem;padding:.8rem;}

  /* 결과 리스트 테이블 — 모바일 */
  .result-table{min-width:auto;}
  .result-table th,.result-table td{padding:.5rem .4rem;font-size:.7rem;}
  .result-table th:nth-child(3),.result-table td:nth-child(3){max-width:100px;}

  /* 상세 매치 행 — 모바일 세로 */
  .rg-match{grid-template-columns:1fr;gap:.4rem;text-align:center;padding:.7rem 0;}
  .rg-teams{justify-content:center;min-width:auto;}
  .rg-score{justify-content:center;}
  .rg-match>div:last-child{justify-content:center;margin-left:0;}
  .inline-score-sm{width:30px;font-size:.9rem;}
  .rg-detail-body{padding:.5rem .5rem;}
}
</style>
</head>
<body>
<nav id="nav">
  <a class="nav-back" href="index.html">홈</a>
  <div class="nav-title">경기 결과</div>
  <div class="nav-links">
    <a class="nav-link" href="schedule.html">시합일정</a>
    <a class="nav-link active" href="results.html">경기결과</a>
    <a class="nav-link" href="ranking.html">랭킹</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-title">Match<br><em>Results</em></div>
  <p class="page-sub">시합 일정에서 확정된 경기 결과를 확인할 수 있습니다.</p>

  <!-- 필터 -->
  <div class="card" style="padding:1.2rem 2rem;">
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end;">
      <div>
        <div style="font-size:.6rem;color:var(--sm2);margin-bottom:.2rem;">이벤트</div>
        <select class="form-select" id="filter-event" onchange="renderMatches()" style="font-size:.78rem;padding:.4rem .6rem;">
          <option value="">전체</option>
        </select>
      </div>
      <div>
        <div style="font-size:.6rem;color:var(--sm2);margin-bottom:.2rem;">기간</div>
        <select class="form-select" id="filter-period" onchange="toggleCustomDate();renderMatches()" style="font-size:.78rem;padding:.4rem .6rem;">
          <option value="">전체 기간</option>
          <option value="month">이번 달</option>
          <option value="custom">기간 지정</option>
        </select>
      </div>
      <div id="custom-date-wrap" style="display:none;display:none;gap:.3rem;align-items:center;">
        <input class="form-input" type="date" id="filter-from" onchange="renderMatches()" style="font-size:.78rem;padding:.4rem;width:130px;">
        <span style="font-size:.7rem;color:var(--sm2);">~</span>
        <input class="form-input" type="date" id="filter-to" onchange="renderMatches()" style="font-size:.78rem;padding:.4rem;width:130px;">
      </div>
    </div>
  </div>

  <!-- 경기 결과 리스트 -->
  <div class="card">
    <div class="card-title">경기 결과</div>
    <div id="matches-list"><div class="state-msg"><span class="spin"></span> 불러오는 중...</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Airtable API ──
const AT_TOKEN='patzqAMF1KGaHm2dz.5153b2df955449d550f431abdd1c6ed561f1b5e2f9a3b9e4a8f6162e2bc7c100';
const AT_BASE='appDtlXaLReCaDeE6';
const AT=`https://api.airtable.com/v0/${AT_BASE}`;
const AT_H={'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'};

async function atGet(table){let all=[],offset=null;do{const url=`${AT}/${encodeURIComponent(table)}${offset?'?offset='+offset:''}`;const r=await fetch(url,{headers:AT_H});const d=await r.json();all.push(...(d.records||[]).map(rec=>{const o={id:rec.id};Object.entries(rec.fields||{}).forEach(([k,v])=>{o[k.charAt(0).toLowerCase()+k.slice(1)]=v;});return o;}));offset=d.offset;}while(offset);return all;}
async function atCreate(table,fields){const r=await fetch(`${AT}/${encodeURIComponent(table)}`,{method:'POST',headers:AT_H,body:JSON.stringify({fields})});const d=await r.json();return d.error?{success:false,error:d.error.message}:{success:true,id:d.id};}
async function atUpdate(table,id,fields){const r=await fetch(`${AT}/${encodeURIComponent(table)}/${id}`,{method:'PATCH',headers:AT_H,body:JSON.stringify({fields})});const d=await r.json();return d.error?{success:false,error:d.error.message}:{success:true,id:d.id};}
async function atDelete(table,id){await fetch(`${AT}/${encodeURIComponent(table)}/${id}`,{method:'DELETE',headers:AT_H});return{success:true};}

const CACHE_TTL=60*1000;const CACHE_VER='v3';
function cacheGet(k){try{const r=localStorage.getItem('dtl_'+CACHE_VER+'_'+k);if(!r)return null;const{data,ts}=JSON.parse(r);return Date.now()-ts>CACHE_TTL?null:data;}catch(e){return null;}}
function cacheSet(k,d){try{localStorage.setItem('dtl_'+CACHE_VER+'_'+k,JSON.stringify({data:d,ts:Date.now()}));}catch(e){}}
const _tbl={getPlayers:'Players',getEvents:'Events',getMatches:'Matches',getSchedules:'Schedules'};
async function cachedFetch(action){const c=cacheGet(action);const table=_tbl[action];if(!table)return c||[];const f=atGet(table).then(d=>{cacheSet(action,d);return d;});if(c){f.catch(()=>{});return c;}return f;}

let players=[],events=[],matches=[];

async function init(){
  try{
    [players, matches, events] = await Promise.all([
      cachedFetch('getPlayers'),
      cachedFetch('getMatches'),
      cachedFetch('getEvents')
    ]);
    players.sort((a,b)=>a.name.localeCompare(b.name));
    // 이벤트 필터 채우기
    const evSel=document.getElementById('filter-event');
    events.forEach(ev=>{evSel.innerHTML+=`<option value="${ev.name}">${ev.name}</option>`;});
    renderMatches();
  }catch(e){
    document.getElementById('matches-list').innerHTML=`<div class="state-msg"><div class="state-icon">⚠️</div><div class="state-text">불러오기 실패</div></div>`;
  }
}

function toggleCustomDate(){
  const v=document.getElementById('filter-period').value;
  document.getElementById('custom-date-wrap').style.display=v==='custom'?'flex':'none';
}

function chip(name){
  if(!name)return'';
  const p=players.find(pl=>pl.name===name);
  const cls=p&&p.gender==='female'?'chip-f':'chip-m';
  return `<span class="chip ${cls}">${name}</span>`;
}

function getFilteredMatches(){
  let filtered=[...matches];
  const eventFilter=document.getElementById('filter-event').value;
  if(eventFilter) filtered=filtered.filter(m=>m.event===eventFilter);
  const period=document.getElementById('filter-period').value;
  if(period==='month'){
    const now=new Date();
    const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    filtered=filtered.filter(m=>String(m.date||'').startsWith(ym));
  } else if(period==='custom'){
    const from=document.getElementById('filter-from').value;
    const to=document.getElementById('filter-to').value;
    if(from) filtered=filtered.filter(m=>String(m.date||'').substring(0,10)>=from);
    if(to) filtered=filtered.filter(m=>String(m.date||'').substring(0,10)<=to);
  }
  return filtered;
}

function groupBySchedule(list){
  const groups={};
  list.forEach(m=>{
    const key=m.schedule_id||m.event||m.id;
    if(!groups[key]) groups[key]={date:m.date,event:m.event,matches:[],schedule_id:m.schedule_id};
    groups[key].matches.push(m);
    if(m.date && (!groups[key].date || m.date > groups[key].date)) groups[key].date=m.date;
  });
  return Object.values(groups).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
}

function getAllPlayerNames(matches){
  const names=new Set();
  matches.forEach(m=>{[m.team1_p1,m.team1_p2,m.team2_p1,m.team2_p2].forEach(n=>{if(n)names.add(n);});});
  return [...names];
}

function renderMatches(){
  const el=document.getElementById('matches-list');
  const list=getFilteredMatches();
  if(!list.length){
    el.innerHTML=`<div class="state-msg"><div class="state-icon">🎾</div><div class="state-text">경기 결과가 없습니다</div></div>`;
    return;
  }
  const groups=groupBySchedule(list);
  el.innerHTML=`<table class="result-table"><thead><tr>
    <th>날짜</th><th>종류</th><th>참여 선수</th><th style="text-align:center;">결과</th><th></th>
  </tr></thead><tbody>
  ${groups.map((g,gi)=>{
    const date=String(g.date||'').substring(0,10);
    const pNames=getAllPlayerNames(g.matches);
    const pSummary=pNames.length>4?pNames.slice(0,4).join(', ')+` 외 ${pNames.length-4}명`:pNames.join(', ');
    const total=g.matches.length;
    const gid='rg_'+gi;
    return `<tr class="rg-row" onclick="document.getElementById('${gid}').style.display=document.getElementById('${gid}').style.display==='none'?'table-row':'none'">
      <td style="white-space:nowrap;font-size:.78rem;">${date}</td>
      <td style="font-size:.78rem;">${g.event||'-'}</td>
      <td style="font-size:.75rem;color:var(--sm);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${pSummary}</td>
      <td style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--g3);">${total}경기 ▾</td>
      <td style="text-align:right;">
        <button class="del-btn" onclick="event.stopPropagation();delScheduleMatches('${g.schedule_id}',${JSON.stringify(g.matches.map(m=>m.id)).replace(/"/g,'&quot;')})" style="font-size:.55rem;padding:.25rem .5rem;border:1px solid rgba(192,57,43,.2);">삭제</button>
      </td>
    </tr>
    <tr id="${gid}" style="display:none;" class="rg-detail-row"><td colspan="5" style="padding:0;">
      <div class="rg-detail-body">
        ${g.matches.map(m=>{
          const s1=parseInt(m.score1)||0,s2=parseInt(m.score2)||0;
          const w1=s1>s2;
          return `<div class="rg-match">
            <div class="rg-teams">${chip(m.team1_p1)} ${chip(m.team1_p2)}</div>
            <div class="rg-score">
              <input class="inline-score-sm" type="number" min="0" max="7" value="${s1}" id="rs1_${m.id}" data-orig="${s1}">
              <span>:</span>
              <input class="inline-score-sm" type="number" min="0" max="7" value="${s2}" id="rs2_${m.id}" data-orig="${s2}">
            </div>
            <div class="rg-teams">${chip(m.team2_p1)} ${chip(m.team2_p2)}</div>
            <div style="margin-left:auto;display:flex;gap:.3rem;">
              <button class="edit-btn" onclick="event.stopPropagation();updateScore('${m.id}')" style="font-size:.55rem;">저장</button>
              <button class="del-btn" onclick="event.stopPropagation();delMatch('${m.id}')" style="font-size:.55rem;">삭제</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </td></tr>`;
  }).join('')}
  </tbody></table>`;
}

async function delScheduleMatches(schedId, ids){
  if(!confirm('이 일정의 모든 경기 기록을 삭제할까요?')) return;
  try{
    await Promise.all(ids.map(id=>atDelete('Matches',id)));
    matches=matches.filter(m=>!ids.includes(m.id));
    renderMatches();
    toast(ids.length+'건 삭제됨','ok');
  }catch(e){toast('삭제 실패','err');}
}

async function updateScore(id){
  const s1El=document.getElementById('rs1_'+id);
  const s2El=document.getElementById('rs2_'+id);
  const s1=parseInt(s1El.value),s2=parseInt(s2El.value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s1>7||s2<0||s2>7){toast('스코어 0~7','err');return;}
  if(s1El.getAttribute('data-orig')===String(s1)&&s2El.getAttribute('data-orig')===String(s2)){toast('변경 없음','err');return;}
  try{
    const res=await atUpdate('Matches',id,{score1:s1,score2:s2});
    if(res.success){
      const m=matches.find(x=>x.id===id);
      if(m){m.score1=s1;m.score2=s2;}
      s1El.setAttribute('data-orig',s1);
      s2El.setAttribute('data-orig',s2);
      toast('수정됨 ✓','ok');
    } else toast('수정 실패','err');
  }catch(e){toast('수정 실패','err');}
}

async function delMatch(id){
  if(!confirm('이 경기 결과를 삭제할까요?')) return;
  try{
    const res=await atDelete('Matches',id);
    if(res.success){
      matches=matches.filter(m=>m.id!==id);
      renderMatches();
      closeDetail();
      toast('삭제됐습니다','ok');
    }
  }catch(e){toast('삭제 실패','err');}
}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',2500);
}

init();
</script>
</body>
</html>
