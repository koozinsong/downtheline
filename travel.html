<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#2c4a35;--g2:#3a5c44;--g3:#4e7a5a;--glt:#7aab87;

html{scroll-behavior:smooth;}
body{font-family:'Barlow','Noto Sans KR',sans-serif;background:var(--iv);color:var(--ink);}
#nav{background:var(--g);height:56px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;position:sticky;top:0;z-index:100;}
.nav-back{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.nav-back:hover{color:var(--gdl);}
.nav-back::before{content:'←';}
.nav-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--w);}
.nav-links{margin-left:auto;display:flex;gap:.5rem;}
.nav-link{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);text-decoration:none;transition:all .2s;padding:.4rem .9rem;border:1px solid rgba(255,255,255,.15);}
.nav-link:hover,.nav-link.active{color:var(--w);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);}
.wrap{max-width:960px;margin:0 auto;padding:3rem 2rem;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;text-transform:uppercase;line-height:.9;color:var(--ink);margin-bottom:.5rem;}
.page-title em{font-style:italic;color:var(--g3);font-weight:300;}
.page-sub{font-size:.88rem;color:var(--sm);font-weight:300;margin-bottom:2rem;line-height:1.7;}

/* Country selector */
.country-tabs{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap;}
.country-tab{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid var(--ll);background:none;color:var(--sm);cursor:pointer;transition:all .2s;}
.country-tab:hover,.country-tab.active{background:var(--g);color:var(--w);border-color:var(--g);}

/* Map */
#map{width:100%;height:400px;border:1px solid var(--ll);margin-bottom:2rem;background:var(--iv2);}

/* Club cards */
.club-card{background:var(--w);border:1px solid var(--ll);margin-bottom:1rem;transition:border-color .2s;}
.club-card:hover{border-color:var(--g3);}
.club-head{padding:1.2rem 1.5rem;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.club-name{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;color:var(--ink);letter-spacing:.5px;}
.club-name-jp{font-size:.78rem;color:var(--sm);font-weight:300;margin-top:.2rem;}
.club-area{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--g3);background:rgba(78,122,90,.08);padding:.2rem .6rem;white-space:nowrap;}
.club-body{display:none;padding:0 1.5rem 1.2rem;border-top:1px solid var(--ll);}
.club-body.open{display:block;padding-top:1rem;}
.club-info{display:grid;grid-template-columns:auto 1fr;gap:.4rem .8rem;font-size:.82rem;margin-bottom:.8rem;}
.club-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g3);}
.club-val{color:var(--ink2);font-weight:300;}
.club-val a{color:var(--g);text-decoration:none;font-weight:500;}
.club-val a:hover{text-decoration:underline;}
.club-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;}
.club-tag{font-size:.65rem;font-weight:500;padding:.2rem .5rem;border-radius:2px;background:var(--iv2);color:var(--sm);}
.club-tag.highlight{background:rgba(78,122,90,.1);color:var(--g);}

  .wrap{padding:1.5rem 1rem;}
  .page-title{font-size:2rem;}
  #nav{padding:0 1rem;gap:.8rem;}
  .nav-title{font-size:.85rem;}
  #map{height:280px;}
  .club-head{padding:.8rem 1rem;}
  .club-body{padding:0 1rem 1rem;}
  .club-info{grid-template-columns:1fr;gap:.3rem;}
}

let map, markers = [];

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.6762, lng: 139.6503 },
    zoom: 11,
    styles: [
      { featureType:'all', elementType:'labels.text.fill', stylers:[{color:'#2c4a35'}] },
      { featureType:'water', stylers:[{color:'#d4e4da'}] },
      { featureType:'landscape', stylers:[{color:'#f0ebe3'}] }
    ]
  });
  selectCountry('japan', document.querySelector('.country-tab.active'));
}

function selectCountry(country, btn) {
  document.querySelectorAll('.country-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderClubs(clubs[country] || []);
}

function renderClubs(list) {
  // Clear markers
  markers.forEach(m => m.setMap(null));
  markers = [];

  const el = document.getElementById('club-list');
  el.innerHTML = list.map((c, i) => {
    // Add marker
    if (map) {
      const marker = new google.maps.Marker({
        position: { lat: c.lat, lng: c.lng },
        map,
        title: c.name,
        label: { text: String(i + 1), color: '#fff', fontSize: '11px', fontWeight: '700' }
      });
      marker.addListener('click', () => {
        document.getElementById('club-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
        toggleClub(i);
      });
      markers.push(marker);
    }

    return `<div class="club-card" id="club-${i}">
      <div class="club-head" onclick="toggleClub(${i});panTo(${c.lat},${c.lng})">
        <div>
          <div class="club-name"><span style="color:var(--gd);margin-right:.4rem;">${i+1}.</span> ${c.name}</div>
          <div class="club-name-jp">${c.nameJp}</div>
        </div>
        <div class="club-area">${c.area}</div>
      </div>
      <div class="club-body" id="cb-${i}">
        <p style="font-size:.82rem;color:var(--ink2);line-height:1.7;margin-bottom:.8rem;">${c.desc}</p>
        <div class="club-info">
          <span class="club-label">주소</span><span class="club-val">${c.address}</span>
          <span class="club-label">가격</span><span class="club-val">${c.price}</span>
          <span class="club-label">웹사이트</span><span class="club-val"><a href="${c.url}" target="_blank">${c.url.replace('https://','').replace('http://','').split('/')[0]}</a></span>
        </div>
        <div class="club-tags">
          ${c.features.map(f => `<span class="club-tag ${f.includes('영어')||f.includes('비지터')||f.includes('5성급')||f.includes('최고급')?'highlight':''}">${f}</span>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleClub(i) {
  const el = document.getElementById('cb-' + i);
  el.classList.toggle('open');
}

function panTo(lat, lng) {
  if (map) map.panTo({ lat, lng });
}

// Google Maps fallback (no API key)
window.initMap = initMap;
</script>
<script>
// Leaflet 대체 (무료, API 키 불필요)
(function(){
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(link);

  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = function() {
    map = L.map('map').setView([35.6762, 139.6503], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    renderClubsLeaflet(clubs.japan, 'japan');
  };
  document.body.appendChild(script);

  const mapCenters = {
    japan: { lat: 35.55, lng: 139.2, zoom: 9 },
    bali: { lat: -8.6500, lng: 115.2200, zoom: 10 }
  };

  function renderClubsLeaflet(list, country) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    const center = mapCenters[country] || mapCenters.japan;
    map.setView([center.lat, center.lng], center.zoom);

    const el = document.getElementById('club-list');
    el.innerHTML = list.map((c, i) => {
      const marker = L.marker([c.lat, c.lng]).addTo(map)
        .bindPopup(`<b>${c.name}</b><br>${c.nameJp}<br>${c.area}`);
      marker.on('click', () => {
        document.getElementById('club-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
        toggleClub(i);
      });
      markers.push(marker);

      return `<div class="club-card" id="club-${i}">
        <div class="club-head" onclick="toggleClub(${i});map.panTo([${c.lat},${c.lng}])">
          <div>
            <div class="club-name"><span style="color:var(--gd);margin-right:.4rem;">${i+1}.</span> ${c.name}</div>
            <div class="club-name-jp">${c.nameJp}</div>
          </div>
          <div class="club-area">${c.area}</div>
        </div>
        <div class="club-body" id="cb-${i}">
          <p style="font-size:.82rem;color:var(--ink2);line-height:1.7;margin-bottom:.8rem;">${c.desc}</p>
          <div class="club-info">
            <span class="club-label">주소</span><span class="club-val">${c.address}</span>
            <span class="club-label">가격</span><span class="club-val">${c.price}</span>
            <span class="club-label">웹사이트</span><span class="club-val"><a href="${c.url}" target="_blank">${c.url.replace('https://','').replace('http://','').split('/')[0]}</a></span>
          </div>
          <div class="club-tags">
            ${c.features.map(f => `<span class="club-tag ${f.includes('영어')||f.includes('비지터')||f.includes('5성급')||f.includes('최고급')?'highlight':''}">${f}</span>`).join('')}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Override selectCountry for Leaflet
  window.selectCountry = function(country, btn) {
    document.querySelectorAll('.country-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderClubsLeaflet(clubs[country] || [], country);
  };
})();
</script>
